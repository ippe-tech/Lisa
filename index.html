<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебя...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0d17;
            --fg: #f0e4cc;
            --muted: #6a6e7a;
            --accent: #d4a24e;
            --accent2: #e8758a;
            --card: rgba(12, 15, 26, 0.92);
            --border: rgba(212, 162, 78, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            width: 100vw; height: 100dvh;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        canvas#sky {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }

        /* === Слои === */
        .overlay {
            position: fixed; inset: 0;
            z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.7s ease;
        }
        .overlay.active { pointer-events: all; opacity: 1; }

        /* === Стекло === */
        .glass {
            background: var(--card);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 32px;
            text-align: center;
            width: 90%; max-width: 420px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }

        /* === Кнопка === */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px;
            padding: 14px 38px;
            background: linear-gradient(135deg, var(--accent), #c08a2a);
            color: var(--bg);
            font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 15px;
            border: none; border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.3px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,162,78,0.35); }
        .btn:active { transform: translateY(0) scale(0.97); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 24px;
            font-size: 13px;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; transform: none; }

        /* === Игровой HUD === */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 15; pointer-events: none;
            padding: max(env(safe-area-inset-top, 12px), 12px) 16px 0;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #hud.active { opacity: 1; }

        .hud-row {
            display: flex; align-items: center; justify-content: center;
            gap: 5px; flex-wrap: wrap;
        }
        .hud-dot {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(212,162,78,0.2);
            background: rgba(255,255,255,0.02);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; flex-shrink: 0;
        }
        .hud-dot.filled {
            border-color: var(--accent);
            background: radial-gradient(circle at 40% 35%, #f0d890, var(--accent));
            box-shadow: 0 0 10px rgba(212,162,78,0.35);
        }
        .hud-dot.filled::after {
            content: ''; position: absolute;
            top: 2px; left: 4px; width: 7px; height: 5px;
            background: rgba(255,255,255,0.45); border-radius: 50%;
            transform: rotate(-30deg);
        }
        .hud-sep {
            width: 1px; height: 16px;
            background: rgba(255,255,255,0.06);
            margin: 0 6px; flex-shrink: 0;
        }
        .hud-counter {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px; font-weight: 700;
            color: var(--accent); margin-top: 7px;
            letter-spacing: 1px;
        }

        /* === Сообщение-карточка === */
        .msg-card {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            z-index: 25; pointer-events: none;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .msg-card.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }
        .msg-card .glass { padding: 36px 28px; max-width: 380px; }
        .msg-card .msg-chapter {
            font-size: 11px; color: var(--accent);
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 14px;
        }
        .msg-card .msg-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 21px; font-weight: 400; font-style: italic;
            line-height: 1.65; color: var(--fg);
            margin-bottom: 24px;
        }
        .msg-card .btn { padding: 12px 32px; font-size: 14px; }

        /* === Финал === */
        .finale .glass { padding: 36px 24px; max-width: 400px; }
        .finale .fin-msg {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px; font-style: italic;
            line-height: 1.7; color: var(--fg);
            margin: 14px 0 24px;
            max-height: 30vh; overflow-y: auto;
        }
        .finale .fin-divider {
            width: 36px; height: 1px;
            background: var(--accent); margin: 0 auto 14px; opacity: 0.4;
        }
        .finale-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        /* ============================
           Галерея
        ============================ */
        .gallery {
            position: fixed; inset: 0;
            z-index: 20;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none; opacity: 0;
            transition: opacity 0.6s ease;
        }
        .gallery.active { pointer-events: all; opacity: 1; }

        .gallery-top {
            position: absolute; top: 0; left: 0; right: 0;
            padding: max(env(safe-area-inset-top, 14px), 14px) 18px 0;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 2;
        }
        .gallery-back {
            background: var(--card);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            color: var(--fg); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .gallery-back:hover { border-color: var(--accent); color: var(--accent); }
        .gallery-counter {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px; color: var(--muted);
            letter-spacing: 1px;
        }

        .gallery-viewport {
            width: 88%; max-width: 440px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
        }

        .gallery-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        .gallery-slide {
            min-width: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            padding: 0 4px;
        }

        .gallery-frame {
            width: 100%;
            aspect-ratio: 3 / 4;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.03);
            position: relative;
        }
        .gallery-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.5s ease;
        }
        .gallery-frame img.loading { opacity: 0; }

        .gallery-caption {
            margin-top: 16px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px; font-style: italic;
            color: var(--fg); text-align: center;
            line-height: 1.5;
            min-height: 28px;
        }

        /* Навигация стрелками */
        .gallery-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px;
            background: var(--card);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--fg); font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
            z-index: 3;
        }
        .gallery-nav:hover { border-color: var(--accent); color: var(--accent); }
        .gallery-nav.prev { left: -52px; }
        .gallery-nav.next { right: -52px; }
        @media (max-width: 520px) {
            .gallery-nav.prev { left: 6px; }
            .gallery-nav.next { right: 6px; }
            .gallery-nav { background: rgba(12,15,26,0.7); }
        }

        /* Точки-индикаторы */
        .gallery-dots {
            display: flex; gap: 8px;
            margin-top: 20px;
            justify-content: center;
        }
        .gallery-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .gallery-dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(212,162,78,0.4);
            transform: scale(1.25);
        }

        /* Свайп-подсказка */
        .swipe-hint {
            position: absolute; bottom: -36px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; color: var(--muted); opacity: 0.5;
            white-space: nowrap;
        }

        /* === Подсказка === */
        .hint-toast {
            position: fixed;
            bottom: max(env(safe-area-inset-bottom, 20px), 20px);
            left: 50%; transform: translateX(-50%) translateY(20px);
            z-index: 30; pointer-events: none;
            background: var(--card);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 22px;
            font-size: 14px; font-weight: 600; color: var(--fg);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            white-space: nowrap;
        }
        .hint-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* === Вспышка === */
        .flash {
            position: fixed; inset: 0; z-index: 5;
            pointer-events: none; opacity: 0;
            transition: opacity 0.15s ease;
        }
        .flash.gold { background: radial-gradient(circle at 50% 50%, rgba(212,162,78,0.12), transparent 70%); }
        .flash.rose { background: radial-gradient(circle at 50% 50%, rgba(232,117,138,0.1), transparent 70%); }
        .flash.on { opacity: 1; }

        /* === Анимации === */
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .anim { animation: fadeUp 0.7s ease both; }
        .d1 { animation-delay: 0.1s; }
        .d2 { animation-delay: 0.25s; }
        .d3 { animation-delay: 0.4s; }
        .d4 { animation-delay: 0.55s; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        @media (max-height: 580px) {
            .glass { padding: 24px 18px; }
            .msg-card .msg-text { font-size: 17px; }
            .finale .fin-msg { font-size: 15px; max-height: 22vh; }
            .gallery-frame { aspect-ratio: 4 / 5; }
            .gallery-caption { font-size: 15px; margin-top: 10px; }
        }
    </style>
</head>
<body>

<canvas id="sky" aria-label="Ночное небо"></canvas>
<div class="flash gold" id="flashGold"></div>
<div class="flash rose" id="flashRose"></div>

<!-- === Вступление === -->
<div class="overlay active" id="scrIntro">
    <div class="glass">
        <p class="anim" style="color:var(--accent);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;">Романтический квест</p>
        <h1 class="anim d1" style="font-size:36px;font-weight:700;margin-bottom:12px;line-height:1.15;">Для тебя...</h1>
        <p class="anim d2" style="color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:32px;">
            На небе ждут тебя 15 особых звёзд.<br>Каждая тройка хранит часть послания.
        </p>
        <div class="anim d3"><button class="btn" id="btnStart">Начать путь</button></div>
        <p class="anim d4" style="color:var(--muted);font-size:11px;margin-top:16px;opacity:0.5;">
            <i class="fa-solid fa-hand-pointer" style="margin-right:3px;"></i> Касайся звёзд
        </p>
    </div>
</div>

<!-- === HUD === -->
<div id="hud">
    <div class="hud-row" id="dotsRow"></div>
    <div class="hud-counter" id="hudCounter">0 / 15</div>
</div>

<!-- === Карточка главы === -->
<div class="msg-card" id="msgCard">
    <div class="glass">
        <div class="msg-chapter" id="msgChapter"></div>
        <div class="msg-text" id="msgText"></div>
        <button class="btn" id="btnContinue">Далее</button>
    </div>
</div>

<!-- === Финал === -->
<div class="overlay finale" id="scrFinale">
    <div class="glass">
        <p style="color:var(--accent);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;">Все звёзды собраны</p>
        <h2 style="font-size:28px;font-weight:700;">Послание раскрыто</h2>
        <div class="fin-divider"></div>
        <div class="fin-msg" id="finMsg"></div>
        <div class="finale-btns">
            <button class="btn" id="btnPhotos"><i class="fa-solid fa-images" style="font-size:13px;"></i> Наши моменты</button>
            <button class="btn btn-ghost" id="btnRestart">Заново</button>
        </div>
    </div>
</div>

<!-- === Галерея === -->
<div class="gallery" id="gallery">
    <div class="gallery-top">
        <button class="gallery-back" id="galleryBack" aria-label="Назад"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="gallery-counter" id="galleryCounter">1 / 5</div>
    </div>

    <div class="gallery-viewport" id="galleryViewport">
        <div class="gallery-track" id="galleryTrack">
            <!-- Слайды генерируются из массива PHOTOS -->
        </div>
        <button class="gallery-nav prev" id="navPrev" aria-label="Предыдущее фото"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="gallery-nav next" id="navNext" aria-label="Следующее фото"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="swipe-hint" id="swipeHint"><i class="fa-solid fa-arrows-left-right" style="margin-right:4px;"></i> Свайпай для переключения</div>
    </div>

    <div class="gallery-dots" id="galleryDots"></div>
</div>

<!-- === Подсказка === -->
<div class="hint-toast" id="hintToast"></div>

<script>
/* =============================================
   КОНФИГУРАЦИЯ
============================================= */
const TOTAL = 15;
const PER_CHAPTER = 3;
const SPAWN_INTERVAL = 85;
const STAR_SIZE_MIN = 20;
const STAR_SIZE_MAX = 34;
const FALL_SPEED = 1.5;
const PARTICLE_COUNT = 16;
const TRAIL_LENGTH = 6;

/* =============================================
   ГЛАВЫ КВЕСТА — меняй текст здесь
============================================= */
const CHAPTERS = [
    "Привет!! Ты:",
    "Очень красивая, мне очень нравятся твои глазки.",
    "Добрая, с отличным характером.",
    "Твоя талия аномалия).",
    "Моя любимая крутышка."
];

const CHAPTER_COLORS = [
    { r:240, g:228, b:204 },
    { r:212, g:162, b:78  },
    { r:232, g:150, b:170 },
    { r:212, g:162, b:78  },
    { r:240, g:228, b:204 },
];

/* =============================================
   ФОТОГРАФИИ — ЗАМЕНИ URL НА СВОИ ФОТО
   src — путь к картинке (можно локальный файл или ссылка)
   caption — подпись под фото
============================================= */
const PHOTOS = [
    {
        // Замени на свою фотографию, например: src: "photos/photo1.jpg"
        src: "https://i.imgur.com/oi7PAiX.jpeg",
        caption: "Это мы!!"
    },
    {
        src: "https://i.imgur.com/NRoLSSb.png",
        caption: "Все таки срослось"
    },
    {
        src: "https://i.imgur.com/RTRYWEg.png",
        caption: "У нас будет такая же фотка!"
    },
    {
        src: "https://i.imgur.com/rAmRtsF.png",
        caption: "Ну прям куколка"
    },
    {
        src: "https://i.imgur.com/TjJq5iY.png",
        caption: "Моя любимая милашка!"
    }
];

/* =============================================
   УТИЛИТЫ
============================================= */
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* =============================================
   CANVAS
============================================= */
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* =============================================
   СОСТОЯНИЕ
============================================= */
const state = {
    phase: 'intro',
    caught: 0, chapter: 0, shownChapters: 0,
    spawnTimer: 0, time: 0,
    waitingForContinue: false,
};
let bgStars = [], stars = [], particles = [], floatTexts = [], fireworks = [];

const nebulae = [
    { xp:0.15, yp:0.25, rp:0.2,  r:200, g:150, b:60,  a:0.025 },
    { xp:0.8,  yp:0.5,  rp:0.22, r:220, g:100, b:130, a:0.02  },
    { xp:0.45, yp:0.8,  rp:0.16, r:80,  g:110, b:180, a:0.018 },
    { xp:0.6,  yp:0.15, rp:0.12, r:180, g:140, b:70,  a:0.015 },
];

function initBg() {
    bgStars = [];
    const count = Math.min(250, Math.floor(W * H / 3500));
    for (let i = 0; i < count; i++) {
        bgStars.push({
            x: rand(0, W), y: rand(0, H),
            s: rand(0.3, 2), b: rand(0.2, 1),
            sp: rand(0.006, 0.03), ph: rand(0, 6.28),
        });
    }
}
initBg();
window.addEventListener('resize', initBg);

/* =============================================
   РИСОВАНИЕ ЗВЕЗДЫ
============================================= */
function drawStar(cx, cy, r, pts, inner) {
    ctx.beginPath();
    for (let i = 0; i < pts * 2; i++) {
        const rad = i % 2 === 0 ? r : r * inner;
        const a = (i * Math.PI) / pts - Math.PI / 2;
        if (i === 0) ctx.moveTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a));
        else ctx.lineTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a));
    }
    ctx.closePath();
}

function starColor() {
    return CHAPTER_COLORS[clamp(state.chapter, 0, CHAPTER_COLORS.length - 1)];
}

/* =============================================
   СПАВН
============================================= */
function spawnStar() {
    if (state.caught >= TOTAL) return;
    const sz = rand(STAR_SIZE_MIN, STAR_SIZE_MAX);
    const col = starColor();
    stars.push({
        x: rand(sz + 20, W - sz - 20), y: -sz * 2.5,
        size: sz, speed: FALL_SPEED * rand(0.85, 1.2),
        rot: rand(0, 6.28), rotSpd: rand(-0.02, 0.02),
        wPh: rand(0, 6.28), wSpd: rand(0.015, 0.04), wAmp: rand(0.3, 0.6),
        pulse: rand(0, 6.28), alive: true, trail: [],
        col, pts: state.chapter % 2 === 0 ? 5 : 6,
    });
}

/* =============================================
   ЧАСТИЦЫ / ТЕКСТ / ФЕЙЕРВЕРКИ
============================================= */
function burst(x, y, r, g, b, n) {
    for (let i = 0; i < n; i++) {
        const a = rand(0, 6.28), sp = rand(1, 5);
        particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rand(0,2), s: rand(1.5,4), r, g, b, life:1, dec: rand(0.012,0.03) });
    }
}
function addFloat(x, y, text, col) {
    floatTexts.push({ x, y, text, col, life:1, vy:-1.6 });
}
function firework() {
    const x = rand(W*0.1, W*0.9), y = rand(H*0.1, H*0.45);
    const pals = [[212,162,78],[232,130,160],[240,228,204],[130,170,220],[170,220,130]];
    const [cr,cg,cb] = pals[randInt(0, pals.length-1)];
    for (let i = 0; i < 40; i++) {
        const a = rand(0,6.28), sp = rand(1,6);
        fireworks.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, s: rand(1.5,3.5), r:cr, g:cg, b:cb, life:1, dec: rand(0.006,0.016), grav:0.025 });
    }
}

/* =============================================
   UI
============================================= */
function buildDots() {
    const row = document.getElementById('dotsRow');
    row.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
        if (i > 0 && i % PER_CHAPTER === 0) {
            const sep = document.createElement('div');
            sep.className = 'hud-sep';
            row.appendChild(sep);
        }
        const d = document.createElement('div');
        d.className = 'hud-dot' + (i < state.caught ? ' filled' : '');
        d.id = 'dot' + i;
        row.appendChild(d);
    }
    document.getElementById('hudCounter').textContent = state.caught + ' / ' + TOTAL;
}
function fillDot(i) {
    const d = document.getElementById('dot' + i);
    if (d) d.classList.add('filled');
    document.getElementById('hudCounter').textContent = state.caught + ' / ' + TOTAL;
}
function showMsgCard() {
    const ci = state.chapter;
    document.getElementById('msgChapter').textContent = 'Глава ' + (ci+1) + ' из ' + CHAPTERS.length;
    document.getElementById('msgText').textContent = CHAPTERS[ci];
    document.getElementById('msgCard').classList.add('show');
}
function hideMsgCard() { document.getElementById('msgCard').classList.remove('show'); }
function flash(type) {
    const el = type === 'rose' ? document.getElementById('flashRose') : document.getElementById('flashGold');
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 350);
}
function hint(text) {
    const el = document.getElementById('hintToast');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
}

/* =============================================
   ЛОВЛЯ ЗВЕЗД
============================================= */
function catchStar(star) {
    star.alive = false;
    state.caught++;
    fillDot(state.caught - 1);
    const c = star.col;
    burst(star.x, star.y, c.r, c.g, c.b, PARTICLE_COUNT);
    const num = (state.caught % PER_CHAPTER || PER_CHAPTER);
    addFloat(star.x, star.y - star.size, num + '/' + PER_CHAPTER, `rgb(${c.r},${c.g},${c.b})`);

    if (state.caught % PER_CHAPTER === 0 && state.shownChapters < CHAPTERS.length) {
        state.chapter = state.shownChapters;
        state.shownChapters++;
        state.phase = 'message';
        state.waitingForContinue = true;
        flash(state.chapter % 2 === 1 ? 'rose' : 'gold');
        setTimeout(() => { if (state.phase === 'message') showMsgCard(); }, 500);
    }
}

/* =============================================
   ЭКРАНЫ
============================================= */
function goIntro() {
    state.phase = 'intro';
    document.getElementById('scrIntro').classList.add('active');
    document.getElementById('hud').classList.remove('active');
    document.getElementById('scrFinale').classList.remove('active');
    document.getElementById('gallery').classList.remove('active');
    hideMsgCard();
}
function goPlay() {
    state.phase = 'playing';
    state.caught = 0; state.chapter = 0; state.shownChapters = 0;
    state.spawnTimer = 0; state.time = 0; state.waitingForContinue = false;
    stars = []; particles = []; floatTexts = []; fireworks = [];
    buildDots();
    document.getElementById('scrIntro').classList.remove('active');
    document.getElementById('scrFinale').classList.remove('active');
    document.getElementById('gallery').classList.remove('active');
    hideMsgCard();
    document.getElementById('hud').classList.add('active');
    hint('Коснись падающей звезды');
}
function goFinale() {
    state.phase = 'finale';
    document.getElementById('hud').classList.remove('active');
    document.getElementById('finMsg').textContent = CHAPTERS.slice(0, -1).join(' ');
    setTimeout(() => document.getElementById('scrFinale').classList.add('active'), 400);
    let n = 0;
    const iv = setInterval(() => { firework(); if (++n > 14) clearInterval(iv); }, 350);
}
function continueGame() {
    hideMsgCard();
    if (state.caught >= TOTAL) setTimeout(goFinale, 400);
    else { state.phase = 'playing'; state.waitingForContinue = false; }
}

/* =============================================
   ГАЛЕРЕЯ
============================================= */
let galIndex = 0;
let touchStartX = 0, touchDeltaX = 0, isSwiping = false;

function buildGallery() {
    const track = document.getElementById('galleryTrack');
    const dots = document.getElementById('galleryDots');
    track.innerHTML = '';
    dots.innerHTML = '';

    PHOTOS.forEach((photo, i) => {
        // Слайд
        const slide = document.createElement('div');
        slide.className = 'gallery-slide';

        const frame = document.createElement('div');
        frame.className = 'gallery-frame';

        const img = document.createElement('img');
        img.src = photo.src;
        img.alt = photo.caption;
        img.className = 'loading';
        img.draggable = false;
        img.onload = () => img.classList.remove('loading');
        img.onerror = () => {
            // Если фото не загрузилось — показываем плейсхолдер
            img.src = '';
            frame.style.background = 'linear-gradient(135deg, rgba(212,162,78,0.08), rgba(232,117,138,0.06))';
            frame.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;flex-direction:column;gap:8px;"><i class="fa-solid fa-image" style="font-size:32px;opacity:0.3;"></i><span>Фото не найдено</span></div>';
        };

        frame.appendChild(img);
        slide.appendChild(frame);

        if (photo.caption) {
            const cap = document.createElement('div');
            cap.className = 'gallery-caption';
            cap.textContent = photo.caption;
            slide.appendChild(cap);
        }

        track.appendChild(slide);

        // Точка
        const dot = document.createElement('div');
        dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goSlide(i));
        dots.appendChild(dot);
    });

    galIndex = 0;
    updateGalleryUI();
}

function goSlide(index) {
    galIndex = clamp(index, 0, PHOTOS.length - 1);
    const track = document.getElementById('galleryTrack');
    track.style.transform = `translateX(-${galIndex * 100}%)`;
    updateGalleryUI();
}

function updateGalleryUI() {
    document.getElementById('galleryCounter').textContent = (galIndex + 1) + ' / ' + PHOTOS.length;
    document.querySelectorAll('.gallery-dot').forEach((d, i) => {
        d.classList.toggle('active', i === galIndex);
    });
    // Скрываем подсказку после первого свайпа
    const sh = document.getElementById('swipeHint');
    if (sh && galIndex > 0) sh.style.opacity = '0';
}

function openGallery() {
    buildGallery();
    document.getElementById('scrFinale').classList.remove('active');
    setTimeout(() => document.getElementById('gallery').classList.add('active'), 300);
}
function closeGallery() {
    document.getElementById('gallery').classList.remove('active');
    setTimeout(() => document.getElementById('scrFinale').classList.add('active'), 400);
}

// Кнопки навигации
document.getElementById('navPrev').addEventListener('click', () => goSlide(galIndex - 1));
document.getElementById('navNext').addEventListener('click', () => goSlide(galIndex + 1));
document.getElementById('galleryBack').addEventListener('click', closeGallery);

// Свайп на тач-устройствах
const viewport = document.getElementById('galleryViewport');
viewport.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchDeltaX = 0;
    isSwiping = true;
    document.getElementById('galleryTrack').style.transition = 'none';
}, { passive: true });

viewport.addEventListener('touchmove', e => {
    if (!isSwiping) return;
    touchDeltaX = e.touches[0].clientX - touchStartX;
    const base = -galIndex * viewport.offsetWidth;
    const offset = base + touchDeltaX;
    document.getElementById('galleryTrack').style.transform = `translateX(${offset}px)`;
}, { passive: true });

viewport.addEventListener('touchend', () => {
    if (!isSwiping) return;
    isSwiping = false;
    document.getElementById('galleryTrack').style.transition = 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1)';
    const threshold = viewport.offsetWidth * 0.2;
    if (touchDeltaX < -threshold && galIndex < PHOTOS.length - 1) goSlide(galIndex + 1);
    else if (touchDeltaX > threshold && galIndex > 0) goSlide(galIndex - 1);
    else goSlide(galIndex);
});

// Клавиатура
document.addEventListener('keydown', e => {
    if (document.getElementById('gallery').classList.contains('active')) {
        if (e.key === 'ArrowLeft') goSlide(galIndex - 1);
        if (e.key === 'ArrowRight') goSlide(galIndex + 1);
        if (e.key === 'Escape') closeGallery();
    }
});

/* =============================================
   ВВОД
============================================= */
function handleTap(px, py) {
    if (state.phase !== 'playing') return;
    let best = null, bestD = Infinity;
    for (const s of stars) {
        if (!s.alive) continue;
        const d = dist(px, py, s.x, s.y);
        if (d < s.size * 1.5 && d < bestD) { best = s; bestD = d; }
    }
    if (best) catchStar(best);
}

canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    handleTap((e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height));
});
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    for (const t of e.changedTouches) {
        handleTap((t.clientX - r.left) * (W / r.width), (t.clientY - r.top) * (H / r.height));
    }
}, { passive: false });

document.getElementById('btnStart').addEventListener('click', goPlay);
document.getElementById('btnContinue').addEventListener('click', continueGame);
document.getElementById('btnPhotos').addEventListener('click', openGallery);
document.getElementById('btnRestart').addEventListener('click', () => { goIntro(); setTimeout(goPlay, 400); });

/* =============================================
   ОБНОВЛЕНИЕ
============================================= */
function update() {
    state.time++;
    if (state.phase === 'playing') {
        state.spawnTimer++;
        if (state.spawnTimer >= SPAWN_INTERVAL) {
            state.spawnTimer = 0;
            spawnStar();
            if (state.time > 300 && Math.random() < 0.3) spawnStar();
        }
    }
    for (const s of stars) {
        if (!s.alive) continue;
        s.y += s.speed;
        s.x += Math.sin(s.wPh) * s.wAmp;
        s.wPh += s.wSpd; s.rot += s.rotSpd; s.pulse += 0.045;
        s.trail.push({ x: s.x, y: s.y });
        if (s.trail.length > TRAIL_LENGTH) s.trail.shift();
        if (s.y > H + s.size * 3) s.alive = false;
    }
    stars = stars.filter(s => s.alive);
    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.055; p.life -= p.dec; p.s *= 0.987; }
    particles = particles.filter(p => p.life > 0 && p.s > 0.3);
    for (const ft of floatTexts) { ft.y += ft.vy; ft.life -= 0.016; }
    floatTexts = floatTexts.filter(ft => ft.life > 0);
    for (const fw of fireworks) { fw.x += fw.vx; fw.y += fw.vy; fw.vy += fw.grav; fw.vx *= 0.99; fw.life -= fw.dec; }
    fireworks = fireworks.filter(fw => fw.life > 0);
    for (const s of bgStars) s.ph += s.sp;
}

/* =============================================
   РЕНДЕРИНГ
============================================= */
function render() {
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#060810');
    bg.addColorStop(0.5, '#0a0e1a');
    bg.addColorStop(1, '#080c15');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    for (const n of nebulae) {
        const nx = n.xp*W, ny = n.yp*H, nr = Math.max(1, n.rp * Math.min(W, H));
        const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
        g.addColorStop(0, `rgba(${n.r},${n.g},${n.b},${n.a})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(nx-nr, ny-nr, nr*2, nr*2);
    }
    for (const s of bgStars) {
        const a = s.b * (0.35 + 0.65 * Math.sin(s.ph));
        ctx.fillStyle = `rgba(240,228,204,${clamp(a,0,1).toFixed(3)})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, Math.max(0.3, s.s), 0, 6.28); ctx.fill();
    }
    for (const s of stars) {
        if (!s.alive) continue;
        const c = s.col, pf = 0.88 + 0.12 * Math.sin(s.pulse), sz = Math.max(2, s.size * pf);
        for (let i = 0; i < s.trail.length; i++) {
            const t = s.trail[i], ta = (i / s.trail.length) * 0.18, ts = sz * 0.35 * (i / s.trail.length);
            ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${ta.toFixed(3)})`;
            ctx.beginPath(); ctx.arc(t.x, t.y, Math.max(0.5, ts), 0, 6.28); ctx.fill();
        }
        ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
        const gr = Math.max(1, sz * 2.6);
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, gr);
        glow.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.2)`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, gr, 0, 6.28); ctx.fill();
        ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
        drawStar(0, 0, sz, s.pts, 0.38); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        drawStar(0, 0, sz * 0.32, s.pts, 0.38); ctx.fill();
        ctx.restore();
    }
    for (const p of particles) {
        ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${clamp(p.life,0,1).toFixed(3)})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.4, p.s), 0, 6.28); ctx.fill();
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const ft of floatTexts) {
        ctx.globalAlpha = clamp(ft.life, 0, 1);
        ctx.fillStyle = ft.col;
        ctx.font = 'bold 16px Nunito, sans-serif';
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;
    for (const fw of fireworks) {
        const a = clamp(fw.life, 0, 1);
        ctx.fillStyle = `rgba(${fw.r},${fw.g},${fw.b},${a.toFixed(3)})`;
        const sz = Math.max(0.4, fw.s * a);
        ctx.beginPath(); ctx.arc(fw.x, fw.y, sz, 0, 6.28); ctx.fill();
        if (a > 0.5) {
            ctx.fillStyle = `rgba(${fw.r},${fw.g},${fw.b},${(a*0.12).toFixed(3)})`;
            ctx.beginPath(); ctx.arc(fw.x, fw.y, sz*3, 0, 6.28); ctx.fill();
        }
    }
}

/* =============================================
   ЗАПУСК
============================================= */
buildDots();
(function loop() { update(); render(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
